name: quiet stats

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: refresh the stats line
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash stats.sh

      - name: commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "numbers unchanged"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "stats refresh"
          git push
